name: Release Moers Festival Android Version

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_bump:
        type: choice
        required: true
        description: Android Version
        default: build
        options:
          - build
          - patch
          - minor
          - major

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate release secrets
        run: |
          test -n "$ANDROID_KEYSTORE_FILE" || { echo "::error::ANDROID_KEYSTORE_FILE secret is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_KEY_ALIAS" || { echo "::error::ANDROID_KEYSTORE_KEY_ALIAS secret is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_KEY_PASSWORD" || { echo "::error::ANDROID_KEYSTORE_KEY_PASSWORD secret is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_STORE_PASSWORD" || { echo "::error::ANDROID_KEYSTORE_STORE_PASSWORD secret is missing"; exit 1; }
          test -n "$ANDROID_LOCAL_PROPERTIES" || { echo "::error::ANDROID_LOCAL_PROPERTIES secret is missing"; exit 1; }
          test -n "$ANDROID_PLAY_CONFIG_JSON" || { echo "::error::ANDROID_PLAY_CONFIG_JSON secret is missing"; exit 1; }
          test -n "$ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES" || { echo "::error::ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES secret is missing"; exit 1; }
        env:
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          ANDROID_KEYSTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          ANDROID_LOCAL_PROPERTIES: ${{ secrets.ANDROID_LOCAL_PROPERTIES }}
          ANDROID_PLAY_CONFIG_JSON: ${{ secrets.ANDROID_PLAY_CONFIG_JSON }}
          ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES: ${{ secrets.ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES }}

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: moers-festival-android

      - name: Install bundle
        run: |
          cd moers-festival-android
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Configure Keystore
        run: |
          echo "$ANDROID_KEYSTORE_FILE" > keystore.jks.b64
          base64 -d -i keystore.jks.b64 > moers-festival-android/Keystore.jks
          echo "keyAlias=$ANDROID_KEYSTORE_KEY_ALIAS" >> keystore.properties
          echo "storePassword=$ANDROID_KEYSTORE_STORE_PASSWORD" >> keystore.properties
          echo "keyPassword=$ANDROID_KEYSTORE_KEY_PASSWORD" >> keystore.properties
        env:
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          ANDROID_KEYSTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}

      - name: Setup local.properties
        run: |
          printf '%s' "$ANDROID_LOCAL_PROPERTIES" > local.properties
          printf '%s' "$ANDROID_LOCAL_PROPERTIES" > moers-festival-android/local.properties
          grep -Eq '^[[:space:]]*FESTIVAL_MAPS_API_KEY[[:space:]]*=[[:space:]]*[^[:space:]]+' moers-festival-android/local.properties || {
            echo "::error::ANDROID_LOCAL_PROPERTIES must contain FESTIVAL_MAPS_API_KEY for the Festival Android release"
            exit 1
          }
        env:
          ANDROID_LOCAL_PROPERTIES: ${{ secrets.ANDROID_LOCAL_PROPERTIES }}

      - name: Write Google Services config
        run: |
          printf '%s' "$ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES" > moers-festival-android/google-services.json
        env:
          ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES: ${{ secrets.ANDROID_MOERS_FESTIVAL_GOOGLE_SERVICES }}

      - name: Create Google Play Config file
        run: |
          echo "$ANDROID_PLAY_CONFIG_JSON" > play_config.json.b64
          base64 -d -i play_config.json.b64 > play_config.json
        env:
          ANDROID_PLAY_CONFIG_JSON: ${{ secrets.ANDROID_PLAY_CONFIG_JSON }}

      - name: Version Bump
        run: |
          echo "Executing version bump: ${{ github.event.inputs.version_bump }}"
          cd moers-festival-android
          bundle exec fastlane android increment_version_code
          
          if [ "${{ github.event.inputs.version_bump }}" != "build" ]; then
            bundle exec fastlane android increment_version mode:${{ github.event.inputs.version_bump }}
          else
            echo "Skipping version name bump as 'build' was selected."
          fi

      - name: Distribute app to internal track
        run: |
          cd moers-festival-android
          bundle exec fastlane android deploy_internal
        env:
          KEYSTORE_PATH: "Keystore.jks"
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}

      - name: Commit version bump and tag
        run: |
          VERSION_NAME=$(grep VERSION_NAME moers-festival-android/version.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION_CODE=$(grep VERSION_CODE moers-festival-android/version.properties | cut -d'=' -f2 | tr -d ' ')
          TAG_NAME="festival-android/${VERSION_NAME}/${VERSION_CODE}"
          
          echo "Version Name: $VERSION_NAME"
          echo "Version Code: $VERSION_CODE"
          echo "Tag Name: $TAG_NAME"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add moers-festival-android/version.properties
          git commit -m "chore(festival-android): bump version to $VERSION_NAME ($VERSION_CODE)"
          git tag $TAG_NAME
          git push origin HEAD
          git push origin $TAG_NAME
