name: Release Moers Festival iOS Version
permissions: write-all

on:
  workflow_dispatch:
    inputs:
      version_bump:
        type: choice
        required: true
        description: iOS Version
        default: build
        options:
          - build
          - patch
          - minor
          - major
      update_screenshots:
        type: boolean
        required: false
        description: Capture, process and upload screenshots to App Store Connect
        default: false

jobs:
  build-ios:
    runs-on: ${{ github.event.inputs.update_screenshots == 'true' && 'macos-26-xlarge' || 'macos-26' }}
    steps:
      - name: Select Xcode
        # macos-26 currently ships Xcode 26.4 RC without the matching iOS platform.
        # Pin 26.3 until the runner image is fixed upstream.
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "true"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode and Store Google Services Plist
        run: |
          echo "${{ secrets.IOS_FESTIVAL_GOOGLE_SERVICES_INFO_PLIST }}" | base64 --decode > "ios/moers festival/moers festival/Utility/GoogleService-Info.plist"

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "ios/moers festival"

      - name: Cache Swift Packages
        uses: actions/cache@v5
        with:
          path: "ios/moers festival/SourcePackages"
          key: ${{ runner.os }}-festival-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-festival-spm-

      - name: Version Bump
        run: |
          echo "Executing version bump: ${{ github.event.inputs.version_bump }}"
          cd "ios/moers festival"
          bundle exec fastlane ios increment_build

          if [ "${{ github.event.inputs.version_bump }}" != "build" ]; then
            bundle exec fastlane ios increment_version type:${{ github.event.inputs.version_bump }}
          else
            echo "Skipping version name bump as 'build' was selected."
          fi

      - name: Install Bun
        if: github.event.inputs.update_screenshots == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install ImageMagick
        if: github.event.inputs.update_screenshots == 'true'
        run: brew install imagemagick

      - name: Install marketing dependencies
        if: github.event.inputs.update_screenshots == 'true'
        run: cd marketing && bun install

      - name: Capture screenshots
        if: github.event.inputs.update_screenshots == 'true'
        run: |
          cd "ios/moers festival"
          bundle exec fastlane ios ensure_app_version
          bundle exec fastlane ios capture
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY: ${{ secrets.ASC_KEY }}

      - name: Fix symlinks and render processed screenshots
        if: github.event.inputs.update_screenshots == 'true'
        run: |
          REPO_ROOT="$(pwd)"
          FASTLANE_SCREENSHOTS="$REPO_ROOT/ios/moers festival/fastlane/screenshots"

          # Recreate symlinks using absolute paths for this runner
          ln -sfn "$FASTLANE_SCREENSHOTS/en-US" marketing/public/screenshots
          ln -sfn "$FASTLANE_SCREENSHOTS" marketing/public/moers-festival

          cd marketing
          bun run src/scripts/export-stills.ts --locale de-DE
          bun run src/scripts/export-stills.ts --locale en-US

      - name: Replace fastlane screenshots with processed stills
        if: github.event.inputs.update_screenshots == 'true'
        run: |
          REPO_ROOT="$(pwd)"
          FASTLANE_SCREENSHOTS="$REPO_ROOT/ios/moers festival/fastlane/screenshots"
          OUT="$REPO_ROOT/marketing/out/screenshots"

          for locale in de-DE en-US; do
            rm -f "$FASTLANE_SCREENSHOTS/$locale/"*.png
            cp "$OUT/$locale/01-timetable.png"    "$FASTLANE_SCREENSHOTS/$locale/iPhone 17 Pro-0-events.png"
            cp "$OUT/$locale/02-event-detail.png" "$FASTLANE_SCREENSHOTS/$locale/iPhone 17 Pro-1-event_detail.png"
            cp "$OUT/$locale/03-info.png"         "$FASTLANE_SCREENSHOTS/$locale/iPhone 17 Pro-2-info.png"
            cp "$OUT/$locale/04-map.png"          "$FASTLANE_SCREENSHOTS/$locale/iPhone 17 Pro-3-map.png"
          done

      - name: Upload screenshots to App Store Connect
        if: github.event.inputs.update_screenshots == 'true'
        run: |
          cd "ios/moers festival"
          bundle exec fastlane ios upload_screenshots
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY: ${{ secrets.ASC_KEY }}

      - name: Ship iOS App
        run: |
          cd "ios/moers festival"
          mkdir -p SourcePackages
          export GYM_CLONED_SOURCE_PACKAGES_PATH="$(pwd)/SourcePackages"

          # Xcode 26.3 occasionally crashes in package graph updates. Try with
          # cached packages first; only wipe and retry on failure.
          echo "Resolving Swift packages (attempt 1/2, using cache if available)"
          if ! xcodebuild -resolvePackageDependencies \
            -project "moers festival.xcodeproj" \
            -scheme "moers festival" \
            -clonedSourcePackagesDirPath "$GYM_CLONED_SOURCE_PACKAGES_PATH"; then

            echo "Retrying package resolution with a clean SourcePackages directory..."
            rm -rf SourcePackages
            mkdir -p SourcePackages

            if ! xcodebuild -resolvePackageDependencies \
              -project "moers festival.xcodeproj" \
              -scheme "moers festival" \
              -clonedSourcePackagesDirPath "$GYM_CLONED_SOURCE_PACKAGES_PATH"; then
              echo "Swift package resolution failed after retry."
              exit 1
            fi
          fi

          bundle exec fastlane ios upload --verbose
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY: ${{ secrets.ASC_KEY }}
          CI: true
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BASIC_AUTH: lambdadigamma:${{ secrets.GITHUB_TOKEN }}
          MATCH_GITHUB_TOKEN: ${{ secrets.MATCH_GITHUB_TOKEN }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 5
          FASTLANE_DISABLE_COLORS: 1

      - name: Upload iOS build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: festival-ios-build-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ios/moers festival/fastlane/buildlogs/**
            /Users/runner/Library/Logs/gym/**
            /Users/runner/Library/Developer/Xcode/DerivedData/**/Logs/Build/**

      - name: Get iOS version and build number
        id: ios_version
        run: |
          IOS_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "ios/moers festival/moers festival/Config/Info.plist")
          IOS_BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "ios/moers festival/moers festival/Config/Info.plist")
          TAG_NAME="festival-ios/${IOS_VERSION}/${IOS_BUILD}"

          echo "iOS Version: $IOS_VERSION"
          echo "iOS Build: $IOS_BUILD"
          echo "Tag Name: $TAG_NAME"

          echo "ios_version=$IOS_VERSION" >> $GITHUB_ENV
          echo "ios_build=$IOS_BUILD" >> $GITHUB_ENV
          echo "tag_name=$TAG_NAME" >> $GITHUB_ENV

      - name: Commit version bump and tag
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🚀 Bump Moers Festival iOS version to ${{ env.ios_version }} (${{ env.ios_build }})"
          tagging_message: "${{ env.tag_name }}"
          file_pattern: "**/Info.plist **/screenshots/**/*.png"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-changelog:
    needs: build-ios
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      modules_changed: ${{ steps.modules.outputs.changed_modules }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog for iOS app
        id: changelog
        uses: inventas/github-action-ai-changelog@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: festival-ios
          module_paths: "ios/moers festival,modules"
          output_format: text
          output_file: "ios/moers festival/fastlane/metadata/en-US/release_notes.txt"
          custom_instructions: >
            These are release notes for the Moers Festival iOS app published on the App Store.
            Focus on what users will notice: new features, visible improvements, and bug fixes.
            Ignore CI changes, dependency updates, and internal refactoring.
            Keep the total length under 4000 characters.
            Do not use any emoji or special Unicode symbols — App Store Connect rejects them.

      - name: Detect changed modules
        id: modules
        run: |
          PREV_TAG=$(git tag -l "festival-ios*" --sort=-v:refname | sed -n '2p')
          MODULES="core events festival-events festival-map festival-news medialibrary news pages parking prosemirror radio rubbish fuel"

          CHANGED=""
          for module in $MODULES; do
            count=$(git diff --name-only ${PREV_TAG}..HEAD -- "modules/$module" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              CHANGED="$CHANGED $module"
            fi
          done

          echo "changed_modules=$CHANGED" >> $GITHUB_OUTPUT

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "ios/moers festival"

      - name: Upload release notes to App Store Connect
        run: |
          cd "ios/moers festival"
          bundle exec fastlane ios upload_release_notes
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY: ${{ secrets.ASC_KEY }}

      - name: Upload release notes as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: festival-ios-release-notes
          path: "ios/moers festival/fastlane/metadata/en-US/release_notes.txt"
          retention-days: 30
